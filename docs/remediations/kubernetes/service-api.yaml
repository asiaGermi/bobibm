apiVersion: v1
kind: Service
metadata:
  name: aml-api-gateway
  namespace: aml-compliance
  labels:
    app: aml-api-gateway
    component: api
  annotations:
    service.kubernetes.io/ibm-load-balancer-cloud-provider-ip-type: "public"
    service.kubernetes.io/ibm-load-balancer-cloud-provider-zone: "us-south-1"
spec:
  type: LoadBalancer
  selector:
    app: aml-api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: aml-api-gateway-internal
  namespace: aml-compliance
  labels:
    app: aml-api-gateway
    component: api
spec:
  type: ClusterIP
  selector:
    app: aml-api-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

