apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-api-gateway
  namespace: aml-compliance
  labels:
    app: aml-api-gateway
    component: api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aml-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aml-api-gateway
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: aml-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api-gateway
        image: icr.io/aml-namespace/aml-api-gateway:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8000"
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: aml-config
              key: ollama_base_url
        - name: LLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: aml-config
              key: llm_model
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: aml-secrets
              key: jwt_secret
        - name: IBM_CLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: aml-secrets
              key: ibm_cloud_api_key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: data-cache
          mountPath: /app/cache
      volumes:
      - name: config
        configMap:
          name: aml-config
      - name: data-cache
        emptyDir:
          sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - aml-api-gateway
              topologyKey: kubernetes.io/hostname

