# Docker Compose configuration for Financial Risk Management API
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-risk-api
    image: financial-risk-management:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount data directory for dataset access
      - ./data:/app/data:ro
    environment:
      # Application settings
      - FRM_APP_NAME=${FRM_APP_NAME:-Financial Risk Management API}
      - FRM_APP_VERSION=${FRM_APP_VERSION:-1.0.0}
      - FRM_API_PREFIX=${FRM_API_PREFIX:-/api/v1}
      
      # Data settings
      - FRM_DATA_PATH=${FRM_DATA_PATH:-/app/data/raw/HI-Small_Trans.csv}
      
      # CORS settings
      - FRM_CORS_ORIGINS=${FRM_CORS_ORIGINS:-*}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - financial-risk-network
    labels:
      - "com.financial-risk.service=api"
      - "com.financial-risk.version=1.0.0"

networks:
  financial-risk-network:
    driver: bridge
    name: financial-risk-network

