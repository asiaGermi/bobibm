# watsonx Orchestrate Skill Definition
# Recommendation Agent for Financial Risk Management

apiVersion: wxo.ibm.com/v1
kind: Skill
metadata:
  name: recommendation-agent
  displayName: Recommendation Agent
  description: Generates structured action recommendations (ALERT, REVIEW, BLOCK, MONITOR) based on risk assessment
  version: 1.0.0
  tags:
    - financial-risk
    - recommendations
    - compliance
    - action-planning

spec:
  # REST API endpoint configuration
  endpoint:
    type: rest
    url: ${API_BASE_URL}/api/v1/recommend/actions
    method: POST
    headers:
      Content-Type: application/json
    authentication:
      type: none  # Add JWT when implemented
  
  # Input schema (matches RecommendActionsRequest in src/api/models.py)
  input:
    type: object
    required:
      - account_id
    properties:
      account_id:
        type: string
        description: Account ID for recommendations
        example: "8000EBD30"
      risk_score:
        type: number
        description: Pre-calculated risk score (if None, will be calculated)
        minimum: 0.0
        maximum: 1.0
        nullable: true
      lookback_days:
        type: integer
        description: Number of days to analyze
        default: 90
        minimum: 1
        maximum: 365
  
  # Output schema (matches RecommendActionsResponse in src/api/models.py)
  output:
    type: object
    properties:
      account_id:
        type: string
        description: Account ID for recommendations
      risk_score:
        type: number
        description: Risk score used for recommendations
        minimum: 0.0
        maximum: 1.0
      risk_level:
        type: string
        description: Risk level classification
        enum: [minimal, low, medium, high, critical]
      recommendations:
        type: array
        description: List of prioritized action recommendations
        items:
          type: object
          properties:
            action:
              type: string
              description: Recommended action type
              enum: [ALERT, REVIEW, BLOCK, MONITOR]
            priority:
              type: string
              description: Priority level
              enum: [routine, low, medium, high, critical, immediate]
            reason:
              type: string
              description: Reason for recommendation
            details:
              type: object
              description: Additional details and evidence
      summary:
        type: string
        description: Executive summary of recommendations
  
  # Error handling
  errorHandling:
    retryPolicy:
      maxAttempts: 3
      backoffMultiplier: 2
      initialInterval: 1s
    timeoutSeconds: 45

